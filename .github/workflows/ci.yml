name: Console CI

on:
  pull_request:
    paths:
      - 'console/**'
      - 'crates/bm/src/web/**'
      - 'crates/bm/Cargo.toml'
      - '.github/workflows/ci.yml'
      - 'Justfile'

jobs:
  console-e2e:
    name: Console E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build console assets
        run: cd console && npm ci && npm run build

      - name: Build binary with embedded console
        run: cargo build -p bm

      - name: Create minimal daemon config
        run: |
          mkdir -p ~/.botminter /tmp/ci-team/team
          cat > ~/.botminter/config.yml << 'EOF'
          workzone: /tmp/ci-workzone
          default_team: ci-team
          teams:
            - name: ci-team
              path: /tmp/ci-team
              profile: scrum-compact
              github_repo: test/repo
              credentials: {}
          EOF
          cat > /tmp/ci-team/team/botminter.yml << 'EOF'
          schema_version: '1.0'
          EOF

      - name: Start daemon
        run: |
          ./target/debug/bm daemon start --port 8484
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8484/health > /dev/null 2>&1; then
              echo "Daemon ready on port 8484"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:8484/health || { echo "Daemon failed to start"; exit 1; }

      - name: Install Playwright browsers
        run: cd console && npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests against daemon
        run: cd console && npx playwright test
        env:
          CI: true
          BASE_URL: http://localhost:8484

      - name: Stop daemon
        if: always()
        run: ./target/debug/bm daemon stop 2>/dev/null || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: console/test-results/
          retention-days: 7
