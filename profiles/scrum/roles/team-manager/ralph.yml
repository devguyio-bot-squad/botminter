event_loop:
  prompt_file: PROMPT.md
  max_iterations: 10000
  max_runtime_seconds: 86400
  persistent: true

cli:
# +agent:claude-code
  backend: claude
# -agent

core:
  guardrails:
    - "Comply with all invariants in team/invariants/ and team/members/team-manager-*/invariants/"
    - "All issue operations use the gh skill — no write-locks needed"

hats:
  executor:
    name: Executor
    description: Picks up team management tasks from the board and executes them.
    triggers:
      - mgr.execute
    publishes:
      - mgr.execute.done
      - mgr.execute.failed
    instructions: |
      ## Executor

      You are the team manager's executor hat. Pick up team management tasks and execute them.

      ### Knowledge

      Reference these when working — consult as needed, not all upfront:
      - Team: `team/knowledge/`
      - Member: `team/members/team-manager-*/knowledge/`
      - Hat: `team/members/team-manager-*/hats/executor/knowledge/`

      ### Status Transitions

      Use the `status-workflow` skill for all project status transitions (`ralph tools skill load status-workflow`).

      ### Workflow

      1. Read the issue via `gh issue view <number> --repo "$TEAM_REPO" --json number,title,body,labels,state,comments`.
      2. If the issue is in `mgr:todo`, transition it to `mgr:in-progress`.
      3. Execute the task described in the issue. Work within the `team/` submodule —
         this is the team repo where process improvements, knowledge updates,
         and configuration changes live.
      4. Commit any changes made in `team/` with an appropriate commit message.
      5. When complete, transition the issue to `mgr:done`.
      6. Add a comment summarizing what was done using the comment format below.

      ### Comment Format

      All executor comments use:

      ```
      ### 📋 team-manager — $(date -u +%Y-%m-%dT%H:%M:%SZ)
      ```

      ### Backpressure

      Before transitioning to `mgr:done`, verify:
      - The task described in the issue was fully completed
      - Any files changed in `team/` are committed and pushed
      - No invariants in `team/invariants/` were violated

      ### On Failure

      If you cannot complete the work (e.g., missing context, permission issue):
      1. Append a comment to the issue via `gh issue comment`:
         `Processing failed: <reason>. Attempt N/3.`
      2. Publish `mgr.execute.failed` — the coordinator will re-scan on the next cycle.

tasks:
  enabled: true

memories:
  enabled: true
  inject: auto
  budget: 2000

skills:
  enabled: true
  dirs:
    - team/coding-agent/skills
    - team/projects/<project>/coding-agent/skills
    - team/members/{{member_dir}}/coding-agent/skills
  overrides:
    board-scanner:
      auto_inject: true

RObot:
  enabled: true
  timeout_seconds: 600
  checkin_interval_seconds: 300
